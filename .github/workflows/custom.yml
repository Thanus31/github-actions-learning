name: Custom Workflow

on:
  push:
    branches: [develop]

jobs:
  custom-job:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v3

      - name: Print environment
        run: |
          echo "Environment: ${{ env.NODE_ENV }}"
          echo "Log Level: ${{ env.LOG_LEVEL }}"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install and Test
        run: |
          cd sample-app
          npm install
          npm test